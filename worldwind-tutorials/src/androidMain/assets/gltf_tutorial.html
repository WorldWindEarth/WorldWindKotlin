<h1>GLTF Tutorial</h1>
<p>
    Demonstrates how to load and display a GLTF 2.0 3D model on the globe.
</p>
<p>
    This example loads an embedded GLTF Box model, places it at an absolute altitude above Boulder, Colorado,
    and scales it to be visible from a 21 km camera range.
</p>
<h2>Example</h2>
<h3>GltfFragment.kt</h3>
<div style="border-top: 1px solid black; border-bottom: 1px solid black;">
    <textarea id="kotlin-code">
class GltfFragment : BasicGlobeFragment() {
    override fun createWorldWindow(): WorldWindow {
        val wwd = super.createWorldWindow()
        val tutorial = GltfTutorial(wwd.engine)
        tutorial.start()
        installDepthPickIndicator(tutorial.picker)
        lifecycleScope.launch {
            tutorial.setupScene()
            wwd.requestRedraw()
        }
        return wwd
    }
}

class GltfTutorial(private val engine: WorldWind) : AbstractTutorial() {
    private val gltfLayer = RenderableLayer("GLTF Box")
    val picker = PickResultIndicator()
    var isStarted = false
        private set

    suspend fun setupScene() {
        val position = Position(40.009993372683.degrees, (-105.272774533734).degrees, 1500.0)
        val scene = GltfLoader(position, MR.assets.gltf.box_gltf).parse(engine.renderResourceCache)
        scene.scale = 5000.0
        gltfLayer.clearRenderables()
        gltfLayer.addRenderable(scene)
    }

    override fun start() {
        engine.layers.addLayer(gltfLayer)
        picker.attach(engine)
        engine.cameraFromLookAt(
            LookAt(
                position = Position(40.009993372683.degrees, (-105.272774533734).degrees, 1500.0),
                altitudeMode = AltitudeMode.ABSOLUTE,
                range = 21000.0,
                heading = 0.0.degrees,
                tilt = 0.0.degrees,
                roll = 0.0.degrees
            )
        )
        isStarted = true
    }

    override fun stop() {
        engine.layers.removeLayer(gltfLayer)
        gltfLayer.clearRenderables()
        picker.detach(engine)
        isStarted = false
    }
}
